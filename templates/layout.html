<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }}</title>
  <link rel="stylesheet" href="{{ .Routes.StaticPicoCSS }}">
  <link rel="stylesheet" href="{{ .Routes.StaticStyles }}">
</head>

<body>
  <header class="container">
    <nav>
      <ul>
        <li><strong><a href="{{ .Routes.Home }}" class="contrast">Go Spark ⚡</a></strong></li>
      </ul>
      <ul>
        {{ if .Authenticated }}
        <li><a href="{{ .Routes.Account }}">Account</a></li>
        <li><button type="submit" form="logout-form" class="secondary">Sign out</button></li>
        {{ else }}
        <li><a href="{{ .Routes.Login }}">Sign in</a></li>
        <li><a href="{{ .Routes.Register }}">Create account</a></li>
        {{ end }}
      </ul>
    </nav>
    {{ if .Authenticated }}
    <form id="logout-form" method="post" action="{{ .Routes.Logout }}" hidden>
      <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}">
    </form>
    {{ end }}
  </header>
  <main class="container">
    {{ template "content" . }}
  </main>
</body>

</html>
