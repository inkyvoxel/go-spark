<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="htmx-config" content='{"responseHandling":[{"code":"204","swap":false},{"code":"[23]..","swap":true},{"code":"422","swap":true},{"code":"[45]..","swap":false,"error":true}]}'>
  <title>{{ .Title }}</title>
  <link rel="stylesheet" href="/static/vendor/pico/pico.min.css">
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/vendor/htmx/htmx.min.js"></script>
</head>

<body>
  <header class="container">
    <nav>
      <ul>
        <li><strong><a href="/" class="contrast">Go Spark ⚡</a></strong></li>
      </ul>
      <ul>
        {{ if .Authenticated }}
        <li><a href="/account">Account</a></li>
        <li><button type="submit" form="logout-form" class="secondary">Sign out</button></li>
        {{ else }}
        <li><a href="/login">Sign in</a></li>
        <li><a href="/register">Create account</a></li>
        {{ end }}
      </ul>
    </nav>
    {{ if .Authenticated }}
    <form id="logout-form" method="post" action="/logout" hidden>
      <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}">
    </form>
    {{ end }}
  </header>
  <main class="container">
    {{ template "content" . }}
  </main>
</body>

</html>
