{{ define "content" }}
<article>
  <h1>Create account</h1>
  {{ template "register_form_section" . }}
  <p><a href="{{ .Routes.Login }}">Sign in instead</a></p>
</article>
{{ end }}

{{ define "register_form_section" }}
<section id="register-form-section">
  {{ if .Error }}<p role="alert">{{ .Error }}</p>{{ end }}
  <form method="post" action="{{ .Routes.Register }}">
    <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}">
    <label>
      Email
      <input type="email" name="email" value="{{ .Email }}" autocomplete="email" pattern="{{ .EmailPattern }}" {{ if
        index .FieldErrors "email" }}aria-invalid="true" {{ end }} required>
      {{ with index .FieldErrors "email" }}<small role="alert">{{ . }}</small>{{ end }}
    </label>
    <label>
      Password
      <input type="password" name="password" autocomplete="new-password" minlength="{{ .PasswordMinLength }}" {{ if
        index .FieldErrors "password" }}aria-invalid="true" {{ end }} required>
      {{ with index .FieldErrors "password" }}<small role="alert">{{ . }}</small>{{ end }}
    </label>
    <label>
      Confirm password
      <input type="password" name="confirm_password" autocomplete="new-password" minlength="{{ .PasswordMinLength }}" {{
        if index .FieldErrors "confirm_password" }}aria-invalid="true" {{ end }} required>
      {{ with index .FieldErrors "confirm_password" }}<small role="alert">{{ . }}</small>{{ end }}
    </label>
    <button type="submit">Create account</button>
  </form>
</section>
{{ end }}
