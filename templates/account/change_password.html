{{ define "content" }}
<article>
  {{ template "breadcrumb" . }}
  <h1>Change password</h1>
  {{ template "change_password_form_section" . }}
  <p><a href="{{ .Routes.Account }}">Back to account</a></p>
</article>
{{ end }}

{{ define "change_password_form_section" }}
<section id="account-change-password-section">
  {{ if .Error }}<p role="alert">{{ .Error }}</p>{{ end }}
  <form method="post" action="{{ .Routes.ChangePassword }}">
    <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}">
    <label>
      Current password
      <input type="password" name="current_password" autocomplete="current-password" {{ if index
        .FieldErrors "current_password" }}aria-invalid="true" {{ end }} required>
      {{ with index .FieldErrors "current_password" }}<small role="alert">{{ . }}</small>{{ end }}
    </label>
    <label>
      New password
      <input type="password" name="new_password" autocomplete="new-password" minlength="{{ .PasswordMinLength }}" {{ if
        index .FieldErrors "new_password" }}aria-invalid="true" {{ end }} required>
      <small>Use at least {{ .PasswordMinLength }} characters.</small>
      {{ with index .FieldErrors "new_password" }}<small role="alert">{{ . }}</small>{{ end }}
    </label>
    <label>
      Confirm new password
      <input type="password" name="confirm_password" autocomplete="new-password" minlength="{{ .PasswordMinLength }}" {{
        if index .FieldErrors "confirm_password" }}aria-invalid="true" {{ end }} required>
      {{ with index .FieldErrors "confirm_password" }}<small role="alert">{{ . }}</small>{{ end }}
    </label>
    <button type="submit">Change password</button>
  </form>
</section>
{{ end }}
