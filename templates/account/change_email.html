{{ define "content" }}
<article>
  {{ template "breadcrumb" . }}
  <h1>Change email address</h1>
  {{ template "change_email_form_section" . }}
  <p><a href="{{ .Routes.Account }}">Back to account</a></p>
</article>
{{ end }}

{{ define "change_email_form_section" }}
<section id="account-change-email-section">
  {{ if .Error }}<p role="alert">{{ .Error }}</p>{{ end }}
  <form method="post" action="{{ .Routes.ChangeEmail }}">
    <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}">
    <label>
      New email address
      <input type="email" name="email" value="{{ .Email }}" autocomplete="email" pattern="{{ .EmailPattern }}" {{ if
        index .FieldErrors "email" }}aria-invalid="true" {{ end }} required>
      {{ with index .FieldErrors "email" }}<small role="alert">{{ . }}</small>{{ end }}
    </label>
    <label>
      Current password
      <input type="password" name="current_password" autocomplete="current-password" {{ if index
        .FieldErrors "current_password" }}aria-invalid="true" {{ end }} required>
      {{ with index .FieldErrors "current_password" }}<small role="alert">{{ . }}</small>{{ end }}
    </label>
    <button type="submit">{{ if .EmailVerificationRequired }}Send verification email{{ else }}Change email address{{ end
      }}</button>
  </form>
</section>
{{ end }}
