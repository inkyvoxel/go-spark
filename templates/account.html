{{ define "content" }}
<section class="intro">
  <p class="eyebrow">Go Spark</p>
  <h1>Account</h1>
  <p>You are signed in as {{ .User.Email }}.</p>
  <form class="inline-form" method="post" action="/logout">
    <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}">
    <button type="submit">Sign out</button>
  </form>
</section>
{{ end }}
