name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Go
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Check modules
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check generated SQL code
        run: |
          go tool sqlc generate
          git diff --exit-code -- internal/db/generated

      - name: Check migrations
        run: go tool goose -dir ./migrations sqlite3 /tmp/go-starter-ci.db up

      - name: Run vulnerability scan
        run: make vulncheck

      - name: Run tests
        run: go test ./...
